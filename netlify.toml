[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PRIVATE_BUILD_WORKER = "1"

[[redirects]]
  from = "https://enso-living.netlify.app/*"
  to = "https://enso-living.netlify.app/living"
  status = 301
  force = true

[[redirects]]
  from = "https://enso-living.netlify.app/"
  to = "https://enso-living.netlify.app/living"
  status = 301
  force = true

[[redirects]]
  from = "https://enso-living.netlify.app/*"
  to = "https://enso-living.netlify.app/living"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"