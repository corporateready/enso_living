<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSO Development - Logo Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* УБРАТЬ ФОН — для использования на сайте удалить строку ниже */
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Контейнер логотипа — просто измени width для масштабирования */
        .logo-container {
            width: 304px;  /* ENSO = 170px */
            height: auto; /* автоматически пропорционально */
        }

        /* SVG растягивается на 100% контейнера */
        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Круговой путь для маски - рисование кистью по часовой стрелке */
        .brush-stroke {
            fill: none;
            stroke: white;
            stroke-width: 20;
            stroke-linecap: round;
            stroke-dasharray: 226;
            stroke-dashoffset: 226;
            animation: drawBrush 1.0s cubic-bezier(0.7, 0, 0.3, 1) forwards;
        }

        @keyframes drawBrush {
            0% {
                stroke-dashoffset: 226;
            }
            100% {
                stroke-dashoffset: 0;
            }
        }

        /* Символ ENSO - будет раскрываться через маску */
        .enso-symbol {
            fill: #ffffff;
        }

        /* Текст ENSO */
        .enso-text path {
            fill: #ffffff;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.8s ease-out forwards;
        }

        /* Поочередная анимация букв ENSO */
        .enso-text path:nth-child(1) { animation-delay: 0.8s; }
        .enso-text path:nth-child(2) { animation-delay: 0.95s; }
        .enso-text path:nth-child(3) { animation-delay: 1.1s; }
        .enso-text path:nth-child(4) { animation-delay: 1.25s; }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Декоративная линия — появляется вместе с буквой O */
        .accent-line {
            fill: #ffffff;
            opacity: 0;
            animation: slideUpFade 0.8s ease-out forwards;
            animation-delay: 1.25s;
        }

        /* Текст DEVELOPMENT */
        .development-text path {
            fill: #ffffff;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* Поочередная анимация букв DEVELOPMENT — начинаются после O+линии */
        .development-text path:nth-child(1) { animation-delay: 1.6s; }
        .development-text path:nth-child(2) { animation-delay: 1.65s; }
        .development-text path:nth-child(3) { animation-delay: 1.7s; }
        .development-text path:nth-child(4) { animation-delay: 1.75s; }
        .development-text path:nth-child(5) { animation-delay: 1.8s; }
        .development-text path:nth-child(6) { animation-delay: 1.85s; }
        .development-text path:nth-child(7) { animation-delay: 1.9s; }
        .development-text path:nth-child(8) { animation-delay: 1.95s; }
        .development-text path:nth-child(9) { animation-delay: 2.0s; }
        .development-text path:nth-child(10) { animation-delay: 2.05s; }
        .development-text path:nth-child(11) { animation-delay: 2.1s; }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
